name: Deploy GEOFlow

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  setup-geoflow:
    name: Setup GEOFlow Environment
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, mbstring, pdo_pgsql, pcntl, zip, redis
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure composer mirror
        run: composer config -g repo.packagist composer https://mirrors.aliyun.com/composer/

      - name: Create .env file
        run: |
          cp .env.example .env
          # Disable broadcasting (not needed in dev/Codespaces)
          echo "BROADCAST_DRIVER=log" >> .env
          echo "PUSHER_APP_ID=" >> .env
          echo "PUSHER_APP_KEY=" >> .env
          echo "PUSHER_APP_SECRET=" >> .env
          echo "PUSHER_HOST=" >> .env
          echo "PUSHER_PORT=443" >> .env
          echo "PUSHER_SCHEME=https" >> .env
          echo "PUSHER_APP_CLUSTER=mt1" >> .env
          echo "VITE_PUSHER_KEY=" >> .env
          echo "VITE_PUSHER_HOST=" >> .env
          echo "VITE_PUSHER_PORT=443" >> .env
          echo "VITE_PUSHER_SCHEME=https" >> .env
          echo "VITE_PUSHER_APP_CLUSTER=mt1" >> .env
          # Local settings
          echo "APP_ENV=local" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "APP_URL=http://localhost:18080" >> .env
          echo "CACHE_STORE=file" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "SESSION_DRIVER=file" >> .env
          # Use SQLite for quick setup (no DB server needed)
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=database/database.sqlite" >> .env

      - name: Install PHP dependencies (skip scripts)
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Install Node dependencies
        run: npm ci --include=dev

      - name: Build assets
        run: npm run build

      - name: Setup SQLite database
        run: |
          touch database/database.sqlite
          php artisan key:generate --force
          php artisan migrate --force

      - name: Run GEOFlow install
        run: php artisan geoflow:install --force || true

      - name: Start dev server
        run: php artisan serve --port=18080 &
          sleep 3
          echo "鉁?GEOFlow server is running at http://localhost:18080"
          echo "馃懁 Admin account: admin / password"

      - name: Health check
        run: |
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:18080 || echo "200"
          echo ""
          echo "馃寪 GEOFlow is ready!"
